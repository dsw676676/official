site_name: 选调准备系统
site_description: 选调生与考公准备资料库
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

plugins:
  - search
  - mermaid2:
      javascript: https://cdn.jsdelivr.net/npm/mermaid@10.4.0/dist/mermaid.esm.min.mjs

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    scheme: default
    primary: indigo
    accent: blue

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - tables
  - toc:
      permalink: true

exclude_docs: |
  .git/**
  .github/**
  .obsidian/**
  site/**
  .vscode/**
  memories/**

nav:
  - 首页: index.md
  - 使用指南: 使用指南.md
  - 核心数据:
      - 概览: 核心数据/index.md
      - 考试类型对比: 核心数据/考试类型对比.md
      - 省份选调摘要: 核心数据/省份选调摘要.md
      - 报名条件速查: 核心数据/报名条件速查.md
  - 官方资源:
      - 概览: 官方资源/index.md
      - 官方网站索引: 官方资源/官方网站索引.md
      - 备考资源指南: 官方资源/备考资源指南.md
  - 时政新闻:
      - 概览: 时政新闻/index.md
      - 新闻简报: 时政新闻/2026-04-13_1526_时政简报.md
  - 详细资料:
      - 概览: 详细资料/index.md
      - 专题研究报告: 详细资料/专题研究报告/index.md
      - 各省详细资料: 详细资料/各省详细资料/index.md
      - 准备参考资料: 详细资料/准备参考资料/index.md
      - 国考专题: 详细资料/国考专题.md
      - 选调专题: 详细资料/选调专题.md
      - 省考专题: 详细资料/省考专题.md
